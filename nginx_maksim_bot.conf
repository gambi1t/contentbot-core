# nginx vhost для maksim-bot.panferov-ai.ru
# Раздача media/covers контент-бота Максима (для HeyGen audio_url, Notion-embed).
# По образцу pit-maksim.panferov-ai.ru.
#
# Установка (ПОСЛЕ создания DNS A-записи maksim-bot.panferov-ai.ru → 89.167.89.133):
#   scp → /etc/nginx/sites-available/maksim-bot.panferov-ai.ru
#   ln -s в sites-enabled/
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d maksim-bot.panferov-ai.ru   (добавит SSL listen 443 + redirect)
server {
    listen 80;
    listen [::]:80;
    server_name maksim-bot.panferov-ai.ru;

    # ACME challenge для certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Media: аудио для HeyGen, видео, файлы
    location /media/ {
        alias /srv/bot-media-maksim/;
        autoindex off;
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "public, max-age=86400";
        types {
            audio/mpeg   mp3;
            audio/mp4    m4a;
            audio/wav    wav;
            video/mp4    mp4;
            video/webm   webm;
            image/png    png;
            image/jpeg   jpg jpeg;
            image/webp   webp;
            application/pdf pdf;
        }
        add_header Accept-Ranges bytes;
    }

    # Covers: обложки роликов
    location /covers/ {
        alias /srv/bot-covers-maksim/;
        autoindex off;
        add_header Cache-Control "public, max-age=86400";
        types {
            image/png    png;
            image/jpeg   jpg jpeg;
            image/webp   webp;
        }
    }

    location = /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Всё остальное — 404 (бот не проксируется через этот домен,
    # Telegram работает через polling, вебхук не нужен)
    location / {
        return 404;
    }

    access_log /var/log/nginx/maksim-bot.access.log;
    error_log /var/log/nginx/maksim-bot.error.log;
}
