<!doctype html>
<html><head><meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<style>
  html, body { width: 1080px; height: 1920px; margin: 0; background: #0A0A0A; overflow: hidden; }
  #scene { position: absolute; inset: 0; }
  /* Огромная оранжевая полоса в safe-area, заметно перемещается */
  #bar { position: absolute; left: 60px; top: 600px;
         width: 800px; height: 200px;
         background: #FF5722; opacity: 1; }
  #txt { position: absolute; left: 60px; top: 900px;
         font-family: sans-serif; font-size: 100px; color: #FFFFFF; }
</style>
</head>
<body>
<div id="scene" data-composition-id="scene_test" data-width="1080" data-height="1920" data-duration="5">
  <div id="bar"></div>
  <div id="txt">МОЦИОН</div>
</div>
<script>
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true });
  // явная анимация: bar едет вправо + меняет color
  tl.to("#bar", { x: 200, duration: 2, ease: "power2.out" }, 0);
  tl.to("#bar", { backgroundColor: "#FFFFFF", duration: 2 }, 0);
  tl.to("#txt", { x: 100, opacity: 0.5, duration: 3 }, 1);
  window.__timelines["scene_test"] = tl;
</script>
</body></html>
