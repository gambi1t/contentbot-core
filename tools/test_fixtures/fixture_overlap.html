<!doctype html>
<html lang="ru"><head><meta charset="UTF-8" />
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1080px; height:1920px; }
  .frame { position:relative; width:1080px; height:1920px; background:#0a0a0a; }
  .box { position:absolute; color:#fff; font-family:sans-serif; }
</style></head>
<body>
  <div class="frame" data-composition-id="fx" data-duration="5" data-width="1080" data-height="1920">
    <!-- ДВА текста реально пересекаются: A(600-760) B(700-860), оба x[100,500] -->
    <div class="box" style="left:100px; top:600px; width:400px; height:160px; font-size:90px;">ААА текст</div>
    <div class="box" style="left:100px; top:700px; width:400px; height:160px; font-size:90px; color:#ff5722;">БББ налезает</div>
  </div>
  <script>window.__timelines = {};</script>
</body></html>
