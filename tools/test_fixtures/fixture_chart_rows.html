<!doctype html>
<html lang="ru"><head><meta charset="UTF-8" />
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1080px; height:1920px; }
  .frame { position:relative; width:1080px; height:1920px; background:#0a0a0a; }
  /* "карточка-чарт" — имеет фон и рамку, hasBgOrBorder=true */
  .card-chart {
    position:absolute; left:60px; top:600px; width:960px; height:720px;
    background:#1a1a1a; border:1px solid #333; border-radius:16px;
  }
  /* плотные метки чарта внутри карточки — нормальная вёрстка */
  .row { position:absolute; left:120px; width:200px; height:22px;
         color:#9aa; font-size:18px; font-family:sans-serif; }
</style></head>
<body>
  <div class="frame" data-composition-id="fx" data-duration="5" data-width="1080" data-height="1920">
    <div class="card-chart">
      <!-- 8 строк-меток с шагом 44px, бокс 22px → gap между боксами 22px (<MIN_GAP 24).
           Это НОРМАЛЬНАЯ табличная вёрстка чарта — не должно быть crowding-issue
           так как обе метки внутри одной карточки (.card-chart). -->
      <div class="row" style="top:80px;">ЯНВ</div>
      <div class="row" style="top:124px;">ФЕВ</div>
      <div class="row" style="top:168px;">МАР</div>
      <div class="row" style="top:212px;">АПР</div>
      <div class="row" style="top:256px;">МАЙ</div>
      <div class="row" style="top:300px;">ИЮН</div>
      <div class="row" style="top:344px;">ИЮЛ</div>
      <div class="row" style="top:388px;">АВГ</div>
    </div>
  </div>
  <script>window.__timelines = {};</script>
</body></html>
