server {
    server_name bot.panferov-ai.ru;

    client_max_body_size 100M;

    location /media/ {
        alias /srv/bot-media/;
        autoindex off;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /privacy {
        alias /srv/bot-static/privacy.html;
        default_type text/html;
        add_header Cache-Control "public, max-age=300";
    }

    location = /data-deletion {
        alias /srv/bot-static/data-deletion.html;
        default_type text/html;
        add_header Cache-Control "public, max-age=300";
    }

    # Music library preview (private page — listen to tracks before picking in bot)
    location = /music {
        alias /srv/bot-static/music_preview.html;
        default_type text/html;
        add_header Cache-Control "no-cache";
    }

    # Audio files for preview page
    location /music-files/ {
        alias /srv/bot-music/;
        autoindex off;
        add_header Cache-Control "public, max-age=86400";
        add_header Accept-Ranges bytes;
    }

    location / {
        proxy_pass http://127.0.0.1:8443;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/bot.panferov-ai.ru/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/bot.panferov-ai.ru/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = bot.panferov-ai.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name bot.panferov-ai.ru;
    return 404; # managed by Certbot


}
